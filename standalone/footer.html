<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenga Mota - Footer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { navy: '#0B2D5C', maroon: '#A51C30' },
                    fontFamily: { 'poppins': ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../styles.css">

<body class="bg-gray-50">
<!-- Footer -->
    <footer class="bg-[#071d3d] text-white/80">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex items-center gap-3">
                    <img src="images/logo.png" alt="Tenga Mota Logo" class="h-10 w-auto brightness-0 invert opacity-90">
                    <div>
                        <div class="font-bold text-white">TENGA MOTA ZIMBABWE</div>
                        <div class="text-xs text-white/60 -mt-0.5">DRIVING YOUR JOURNEY, DELIVERING VALUE.</div>
                    </div>
                </div>
                <div class="text-sm text-center md:text-right">
                    <div>© 2026 Tenga Mota Zimbabwe. All rights reserved.</div>
                    <div class="text-white/50 mt-1">Lot 1 Hillside, Harare • +263 719 139 928</div>
                </div>
            </div>
        </div>
    </footer>
<script src="../script.js"></script>
</body>
</html>
